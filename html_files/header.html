<!-- header.html -->
<header class="header-container glassmorphism-container">
  <div class="header-left">
    <img id="profile-pic" src="assets/header_pics/profile_pic_1.png"
         alt="Profile Picture" class="profile-pic clickable-pic">
  </div>

  <!-- Hamburger button (visible only on mobile via CSS) -->
  <button class="hamburger" id="hamburger-btn" aria-label="Toggle navigation">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="header-right">
    <nav class="nav-links" id="nav-links">
      <a href="#about">About</a>
      <a href="#skills">Skills</a>
      <a href="#education">Education</a>
      <a href="#experience">Experience</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact Me</a>
    </nav>
  </div>
</header>

<script src="scripts/header.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    // Profile picture initializer
    if (typeof window.initProfilePicture === "function") {
      window.initProfilePicture();
    }

    // Hamburger toggle
    const btn = document.getElementById("hamburger-btn");
    const nav = document.getElementById("nav-links");

    if (btn && nav) {
      btn.addEventListener("click", () => {
        btn.classList.toggle("open");
        nav.classList.toggle("open");
      });

      // Close menu when a nav link is clicked
      nav.querySelectorAll("a").forEach(link => {
        link.addEventListener("click", () => {
          btn.classList.remove("open");
          nav.classList.remove("open");
        });
      });
    }
  });
</script>
